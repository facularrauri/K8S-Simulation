apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: consumer
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install pika && python -u /app/consumer.py
        volumeMounts:
        - name: code-volume
          mountPath: /app
        env:
        - name: RABBITMQ_HOST
          value: "rabbitmq"
        - name: RABBITMQ_USER
          value: "user"
        - name: RABBITMQ_PASS
          value: "password"
        - name: QUEUE_NAME
          value: "task_queue"
      volumes:
      - name: code-volume
        configMap:
          name: consumer-script
