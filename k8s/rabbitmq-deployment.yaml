apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        - containerPort: 15692
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "user"
        - name: RABBITMQ_DEFAULT_PASS
          value: "password"
        - name: RABBITMQ_ENABLED_PLUGINS_FILE
          value: "/tmp/rabbitmq-plugins"
        command:
        - /bin/bash
        - -c
        - |
          echo "[rabbitmq_management,rabbitmq_prometheus]." > /tmp/rabbitmq-plugins
          docker-entrypoint.sh rabbitmq-server
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
      name: amqp
    - protocol: TCP
      port: 15672
      targetPort: 15672
      name: management
    - protocol: TCP
      port: 15692
      targetPort: 15692
      name: prometheus
  type: LoadBalancer
